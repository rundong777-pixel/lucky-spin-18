<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin 18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .header { text-align: center; color: white; margin-bottom: 10px; }
        .header h1 { font-size: 24px; font-weight: 700; }
        .score-board { background: white; border-radius: 15px; padding: 10px 25px; margin-bottom: 15px; display: flex; gap: 25px; }
        .score-value { font-size: 24px; font-weight: 700; color: #667eea; }
        .score-label { font-size: 11px; color: #666; }
        .game-container { position: relative; width: 340px; height: 340px; margin-bottom: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 10px; }
        .cell { position: absolute; width: 55px; height: 55px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .cell.normal { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .cell.empty { background: linear-gradient(135deg, #e0e0e0 0%, #bdbdbd 100%); color: #666; }
        .cell.bonus { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white; }
        .cell.prize { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #d63031; border: 3px solid #d63031; }
        .cell.active { box-shadow: 0 0 20px #ffd700; transform: scale(1.1); z-index: 10; }
        .center-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .dice-box { width: 70px; height: 70px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 3px solid #ddd; }
        .dice-box.rolling { animation: rollDice 0.6s ease-in-out; }
        @keyframes rollDice { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        .roll-btn { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 15px 50px; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .roll-btn:disabled { background: #ccc; }
        .action-btn { background: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 13px; margin: 5px; cursor: pointer; }
        .message { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; text-align: center; z-index: 100; }
        .message.show { display: block; }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        .overlay.show { display: block; }
    </style>
</head>
<body>
    <div class="header"><h1>🎲 Lucky Spin 18</h1></div>
    <div class="score-board">
        <div><div class="score-value" id="currentScore">10</div><div class="score-label">积分</div></div>
        <div><div class="score-value" id="totalRounds">0</div><div class="score-label">圈数</div></div>
    </div>
    <div class="game-container">
        <div id="board"></div>
        <div class="center-area"><div class="dice-box" id="dice">🎲</div></div>
    </div>
    <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 掷骰子 (3分)</button>
    <div>
        <button class="action-btn" onclick="watchAd()">📺 广告+5分</button>
        <button class="action-btn" onclick="buyPoints()">💎 买积分</button>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="message" id="message"><div id="msgIcon" style="font-size:50px;">🎉</div><div id="msgText">消息</div></div>
    <script>
        let score = 10, pos = 0, rounds = 0, rolling = false;
        const diceFaces = ['', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        let cells = [
            {p:1,t:'normal'},{p:2,t:'normal'},{p:0,t:'empty'},{p:1,t:'normal'},{p:3,t:'bonus'},{p:0,t:'empty'},
            {p:1,t:'normal'},{p:0,t:'prize'},{p:2,t:'normal'},{p:0,t:'empty'},{p:1,t:'normal'},{p:5,t:'bonus'},
            {p:0,t:'empty'},{p:1,t:'normal'},{p:2,t:'normal'},{p:0,t:'empty'},{p:1,t:'normal'},{p:2,t:'normal'}
        ];
        function getPos(i) {
            const s=60,g=5,x=10,y=10;
            if(i<6)return{x:x+i*(s+g),y:y};
            if(i<12)return{x:x+5*(s+g),y:y+(i-5)*(s+g)};
            return{x:x+(17-i)*(s+g),y:y+5*(s+g)};
        }
        function init() {
            const b=document.getElementById('board');b.innerHTML='';
            cells.forEach((c,i)=>{
                const p=getPos(i),el=document.createElement('div');
                el.className='cell '+c.t;el.style.left=p.x+'px';el.style.top=p.y+'px';el.id='c'+i;
                el.innerHTML=c.t=='prize'?'🎁':`<div style="font-size:9px;">${i+1}</div><div>${c.p>0?'+'+c.p:c.p}</div>`;
                b.appendChild(el);
            });
            document.querySelectorAll('.cell').forEach(c=>c.classList.remove('active'));
            document.getElementById('c'+pos).classList.add('active');
        }
        async function rollDice() {
            if(rolling)return;if(score<3){show('😅','积分不足');return;}
            rolling=true;score-=3;document.getElementById('currentScore').textContent=score;
            const d=document.getElementById('dice'),btn=document.getElementById('rollBtn');
            btn.disabled=true;d.classList.add('rolling');
            for(let i=0;i<10;i++){d.textContent=diceFaces[Math.floor(Math.random()*6)+1];await sleep(60);}
            d.classList.remove('rolling');
            const v=Math.floor(Math.random()*6)+1;d.textContent=diceFaces[v];
            await move(v);btn.disabled=false;rolling=false;
        }
        async function move(s) {
            for(let i=0;i<s;i++){pos=(pos+1)%18;init();await sleep(200);}
            if(pos<s){rounds++;document.getElementById('totalRounds').textContent=rounds;shuffle();}
            const c=cells[pos];
            if(c.t=='prize')setTimeout(lottery,500);
            else if(c.p>0){score+=c.p;document.getElementById('currentScore').textContent=score;show('🎉','+'+c.p+'分');}
            else show('😅','空白格');
        }
        function shuffle(){const p=cells.find(c=>c.t=='prize'),o=cells.filter(c=>c.t!='prize').sort(()=>Math.random()-0.5);o.splice(Math.floor(Math.random()*18),0,p);cells=o;init();show('🔄','格子变化');}
        function lottery(){const r=Math.random(),p=[{n:'iPhone',pr:0.0001,i:'📱'},{n:'AirPods',pr:0.005,i:'🎧'},{n:'充电宝',pr:0.05,i:'🔋'},{n:'支架',pr:0.20,i:'📲'},{n:'10分',pr:0.7449,i:'💎'}];let c=0,w=p[4];for(const x of p){c+=x.pr;if(r<=c){w=x;break;}}if(w.n=='10分'){score+=10;document.getElementById('currentScore').textContent=score;}show(w.i,w.n);}
        function show(i,t){document.getElementById('msgIcon').textContent=i;document.getElementById('msgText').textContent=t;document.getElementById('overlay').classList.add('show');document.getElementById('message').classList.add('show');setTimeout(()=>{document.getElementById('overlay').classList.remove('show');document.getElementById('message').classList.remove('show');},2000);}
        function watchAd(){show('📺','+5分');setTimeout(()=>{score+=5;document.getElementById('currentScore').textContent=score;},2000);}
        function buyPoints(){const c=prompt('1.10分-1元\n2.100分-6元\n3.500分-25元');if(c=='1')score+=10;if(c=='2')score+=100;if(c=='3')score+=500;document.getElementById('currentScore').textContent=score;}
        function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
        init();
    </script>
</body>
</html>
