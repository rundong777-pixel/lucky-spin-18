<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Dice - 幸运骰子</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #0d5c3b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }
        
        /* 标题 */
        .title {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        
        /* 积分显示 */
        .score-display {
            background: #1a1a1a;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 10px 30px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .score-label {
            color: #888;
            font-size: 12px;
        }
        
        .score-value {
            color: #ffd700;
            font-size: 32px;
            font-weight: bold;
        }
        
        /* 游戏区域 */
        .game-area {
            width: 320px;
            height: 320px;
            background: #1a472a;
            border: 4px solid #8b4513;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* 格子 */
        .cell {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #fff;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* 皇后棋子 */
        .queen-piece {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: all 0.3s ease-out;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            pointer-events: none;
        }
        
        .queen-piece.jumping {
            animation: jump 0.3s ease-out;
        }
        
        @keyframes jump {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.2) translateY(-10px); }
            100% { transform: scale(1) translateY(0); }
        }
        
        .cell.normal { background: #fff; color: #333; }
        .cell.empty { background: #e0e0e0; color: #666; }
        .cell.bonus { background: #ffd700; color: #000; }
        .cell.prize { 
            background: #ff4444; 
            color: #fff;
            border: 3px solid #ffd700;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .cell.active {
            box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700;
            transform: scale(1.1);
            z-index: 10;
        }
        
        .cell-num { font-size: 10px; color: #666; }
        .cell-points { font-size: 16px; }
        
        /* 骰子画布 */
        #dice-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            z-index: 100;
        }
        
        /* 按钮 */
        .btn-roll {
            margin-top: 20px;
            background: linear-gradient(180deg, #ffd700 0%, #ffaa00 100%);
            border: 3px solid #8b4513;
            border-radius: 50px;
            padding: 15px 50px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn-roll:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .btn-roll:disabled {
            background: #666;
            border-color: #444;
            cursor: not-allowed;
        }
        
        .btn-small {
            background: #1a1a1a;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin: 5px;
        }
        
        /* 奖品展示 */
        .prizes-bar {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 10px;
            border: 1px solid #444;
        }
        
        .prize-mini {
            text-align: center;
            padding: 5px 10px;
            background: #333;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .prize-mini:hover { background: #444; }
        .prize-mini .icon { font-size: 24px; }
        .prize-mini .name { font-size: 9px; color: #ffd700; }
        
        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.show { display: flex; }
        
        .modal-content {
            background: #1a1a1a;
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
        }
        
        .modal-icon { font-size: 60px; margin-bottom: 10px; }
        .modal-text { color: #fff; font-size: 18px; font-weight: bold; }
        .modal-prize { color: #ffd700; font-size: 24px; margin-top: 10px; }
        
        .btn-close {
            margin-top: 20px;
            background: #ffd700;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* 奖品页面 */
        .prize-page {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0d5c3b;
            z-index: 300;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }
        
        .prize-page.show { display: flex; }
        
        .prize-page h2 {
            color: #ffd700;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .prize-list {
            width: 100%;
            max-width: 350px;
        }
        
        .prize-item {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .prize-item .icon { font-size: 35px; margin-right: 15px; }
        .prize-item .info { flex: 1; text-align: left; }
        .prize-item .name { color: #fff; font-size: 16px; font-weight: bold; }
        .prize-item .prob { color: #888; font-size: 12px; }
        .prize-item .tag {
            background: #ffd700;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .btn-back {
            margin-top: 20px;
            background: transparent;
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 主游戏 -->
    <div id="main-page">
        <div class="title">🎲 LUCKY DICE 🎲</div>
        
        <div class="score-display">
            <div class="score-label">CREDITS</div>
            <div class="score-value" id="score">10</div>
        </div>
        
        <div class="game-area" id="board">
            <canvas id="dice-canvas"></canvas>
        </div>
        
        <button class="btn-roll" id="rollBtn" onclick="roll()">ROLL DICE (3)</button>
        
        <div>
            <button class="btn-small" onclick="watchAd()">📺 AD +5</button>
            <button class="btn-small" onclick="buy()">💎 BUY</button>
            <button class="btn-small" onclick="showPrizes()">🎁 PRIZES</button>
        </div>
        
        <!-- 奖品快捷栏 -->
        <div class="prizes-bar">
            <div class="prize-mini" onclick="showPrizes()">
                <div class="icon">📱</div>
                <div class="name">iPhone</div>
            </div>
            <div class="prize-mini" onclick="showPrizes()">
                <div class="icon">🎧</div>
                <div class="name">AirPods</div>
            </div>
            <div class="prize-mini" onclick="showPrizes()">
                <div class="icon">🔋</div>
                <div class="name">Power</div>
            </div>
            <div class="prize-mini" onclick="showPrizes()">
                <div class="icon">📲</div>
                <div class="name">Stand</div>
            </div>
            <div class="prize-mini" onclick="showPrizes()">
                <div class="icon">💎</div>
                <div class="name">Credits</div>
            </div>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-text" id="modalText">Message</div>
            <div class="modal-prize" id="modalPrize"></div>
            <button class="btn-close" onclick="closeModal()">OK</button>
        </div>
    </div>
    
    <!-- 奖品页面 -->
    <div class="prize-page" id="prizePage">
        <h2>🏆 PRIZE LIST 🏆</h2>
        <div class="prize-list">
            <div class="prize-item">
                <div class="icon">📱</div>
                <div class="info">
                    <div class="name">iPhone 16 Pro</div>
                    <div class="prob">Chance: 0.01%</div>
                </div>
                <div class="tag">JACKPOT</div>
            </div>
            <div class="prize-item">
                <div class="icon">🎧</div>
                <div class="info">
                    <div class="name">AirPods Pro 2</div>
                    <div class="prob">Chance: 0.5%</div>
                </div>
                <div class="tag">GOLD</div>
            </div>
            <div class="prize-item">
                <div class="icon">🔋</div>
                <div class="info">
                    <div class="name">Power Bank</div>
                    <div class="prob">Chance: 5%</div>
                </div>
                <div class="tag">SILVER</div>
            </div>
            <div class="prize-item">
                <div class="icon">📲</div>
                <div class="info">
                    <div class="name">Phone Stand</div>
                    <div class="prob">Chance: 20%</div>
                </div>
                <div class="tag">BRONZE</div>
            </div>
            <div class="prize-item">
                <div class="icon">💎</div>
                <div class="info">
                    <div class="name">10 Credits</div>
                    <div class="prob">Chance: 74.49%</div>
                </div>
                <div class="tag">PARTICIPATION</div>
            </div>
        </div>
        <button class="btn-back" onclick="hidePrizes()">← BACK TO GAME</button>
    </div>

    <script>
        // 16格配置
        let cells = [
            {id:1,p:1,t:'n'},{id:2,p:2,t:'n'},{id:3,p:0,t:'e'},{id:4,p:1,t:'n'},
            {id:5,p:3,t:'b'},{id:6,p:0,t:'e'},{id:7,p:1,t:'n'},{id:8,p:0,t:'prize'},
            {id:9,p:2,t:'n'},{id:10,p:0,t:'e'},{id:11,p:5,t:'b'},{id:12,p:0,t:'e'},
            {id:13,p:1,t:'n'},{id:14,p:2,t:'n'},{id:15,p:0,t:'e'},{id:16,p:1,t:'n'}
        ];
        
        let score = 10, pos = 0, rolling = false;
        let scene, camera, renderer, dice;
        
        // 初始化Three.js骰子
        function initDice() {
            const canvas = document.getElementById('dice-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
            camera.position.z = 3;
            
            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(80, 80);
            
            // 白色骰子
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const materials = [];
            
            // 6个面的材质
            for (let i = 0; i < 6; i++) {
                const cvs = document.createElement('canvas');
                cvs.width = 128; cvs.height = 128;
                const ctx = cvs.getContext('2d');
                
                // 白色背景
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 128, 128);
                
                // 边框
                ctx.strokeStyle = '#cccccc';
                ctx.lineWidth = 3;
                ctx.strokeRect(2, 2, 124, 124);
                
                // 黑色圆点
                ctx.fillStyle = '#000000';
                const dots = [
                    [],
                    [[64, 64]],
                    [[32, 32], [96, 96]],
                    [[32, 32], [64, 64], [96, 96]],
                    [[32, 32], [96, 32], [32, 96], [96, 96]],
                    [[32, 32], [96, 32], [64, 64], [32, 96], [96, 96]],
                    [[32, 32], [96, 32], [32, 64], [96, 64], [32, 96], [96, 96]]
                ];
                
                dots[i + 1].forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p[0], p[1], 12, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                materials.push(new THREE.MeshPhongMaterial({ 
                    map: new THREE.CanvasTexture(cvs),
                    shininess: 100
                }));
            }
            
            dice = new THREE.Mesh(geometry, materials);
            scene.add(dice);
            
            // 灯光
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            renderer.render(scene, camera);
        }
        
        // 4x4格子位置
        function getPos(i) {
            const size = 65, gap = 8, startX = 20, startY = 20;
            const row = Math.floor(i / 4);
            const col = i % 4;
            return {
                x: startX + col * (size + gap),
                y: startY + row * (size + gap)
            };
        }
        
        function initBoard() {
            const board = document.getElementById('board');
            const canvas = document.getElementById('dice-canvas');
            board.innerHTML = '';
            board.appendChild(canvas);
            
            cells.forEach((c, i) => {
                const p = getPos(i);
                const el = document.createElement('div');
                el.className = 'cell ' + (c.t === 'n' ? 'normal' : c.t === 'e' ? 'empty' : c.t === 'b' ? 'bonus' : 'prize');
                el.style.left = p.x + 'px';
                el.style.top = p.y + 'px';
                el.id = 'c' + i;
                el.innerHTML = c.t === 'prize' ? '🎁' : `<div class="cell-num">${c.id}</div><div class="cell-points">${c.p > 0 ? '+' + c.p : c.p}</div>`;
                board.appendChild(el);
            });
            
            // 创建皇后棋子
            const queen = document.createElement('div');
            queen.className = 'queen-piece';
            queen.id = 'queen';
            queen.innerHTML = '♛';
            board.appendChild(queen);
            
            updateQueenPosition();
        }
        
        function updateQueenPosition() {
            const queen = document.getElementById('queen');
            const cellPos = getPos(pos);
            queen.style.left = (cellPos.x + 10) + 'px';
            queen.style.top = (cellPos.y + 5) + 'px';
        }
        
        function highlight() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            document.getElementById('c' + pos).classList.add('active');
        }
        
        // 显示/隐藏奖品页
        function showPrizes() {
            document.getElementById('prizePage').classList.add('show');
        }
        function hidePrizes() {
            document.getElementById('prizePage').classList.remove('show');
        }
        
        // 弹窗
        function showModal(icon, text, prize) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalPrize').textContent = prize || '';
            document.getElementById('modal').classList.add('show');
        }
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        async function roll() {
            if (rolling) return;
            if (score < 3) {
                showModal('😅', 'Not Enough Credits!', 'Need 3 credits to roll');
                return;
            }
            
            rolling = true;
            score -= 3;
            document.getElementById('score').textContent = score;
            document.getElementById('rollBtn').disabled = true;
            
            const result = Math.floor(Math.random() * 6) + 1;
            const canvas = document.getElementById('dice-canvas');
            canvas.style.display = 'block';
            
            // 旋转动画
            let rot = 0;
            const animate = () => {
                rot += 25;
                dice.rotation.set(rot * 0.6, rot, rot * 0.4);
                renderer.render(scene, camera);
                if (rot < 720) requestAnimationFrame(animate);
            };
            animate();
            
            await sleep(800);
            
            // 显示结果面
            const rots = {
                1: {x: 0, y: 0, z: 0},
                2: {x: -Math.PI/2, y: 0, z: 0},
                3: {x: 0, y: Math.PI/2, z: 0},
                4: {x: 0, y: -Math.PI/2, z: 0},
                5: {x: Math.PI/2, y: 0, z: 0},
                6: {x: Math.PI, y: 0, z: 0}
            };
            dice.rotation.set(rots[result].x, rots[result].y, rots[result].z);
            renderer.render(scene, camera);
            
            await sleep(400);
            
            // 移动骰子到目标格子
            const target = getPos((pos + result) % 16);
            canvas.style.transition = 'all 0.3s ease-out';
            canvas.style.left = (target.x + 30) + 'px';
            canvas.style.top = (target.y + 30) + 'px';
            canvas.style.transform = 'translate(-50%, -50%) scale(0.5)';
            
            await sleep(300);
            canvas.style.display = 'none';
            canvas.style.transform = 'translate(-50%, -50%) scale(1)';
            canvas.style.left = '50%';
            canvas.style.top = '50%';
            canvas.style.transition = '';
            
            // 移动棋子
            await move(result);
            
            document.getElementById('rollBtn').disabled = false;
            rolling = false;
        }
        
        async function move(steps) {
            const queen = document.getElementById('queen');
            
            for (let i = 0; i < steps; i++) {
                pos = (pos + 1) % 16;
                highlight();
                
                // 皇后棋子跳动动画
                if (queen) {
                    queen.classList.add('jumping');
                    updateQueenPosition();
                    setTimeout(() => queen.classList.remove('jumping'), 300);
                }
                
                await sleep(300);
            }
            
            const c = cells[pos];
            if (c.t === 'prize') {
                setTimeout(() => doLottery(), 300);
            } else if (c.p > 0) {
                score += c.p;
                document.getElementById('score').textContent = score;
                showModal('🎉', 'You Got Credits!', '+' + c.p + ' Credits');
            } else {
                showModal('😅', 'Empty Cell', 'No credits this time');
            }
        }
        
        function doLottery() {
            const r = Math.random();
            const prizes = [
                {n: 'iPhone 16 Pro!', p: 0.0001, i: '📱'},
                {n: 'AirPods Pro 2!', p: 0.005, i: '🎧'},
                {n: 'Power Bank', p: 0.05, i: '🔋'},
                {n: 'Phone Stand', p: 0.20, i: '📲'},
                {n: '10 Credits', p: 0.7449, i: '💎'}
            ];
            
            let cum = 0, won = prizes[4];
            for (const p of prizes) {
                cum += p.p;
                if (r <= cum) { won = p; break; }
            }
            
            if (won.n === '10 Credits') {
                score += 10;
                document.getElementById('score').textContent = score;
            }
            
            showModal(won.i, 'CONGRATULATIONS!', 'You won: ' + won.n);
        }
        
        function watchAd() {
            showModal('📺', 'Watching Advertisement...', '+5 Credits coming soon');
            setTimeout(() => {
                score += 5;
                document.getElementById('score').textContent = score;
                showModal('💎', 'Credits Added!', '+5 Credits');
            }, 2000);
        }
        
        function buy() {
            const c = prompt('Buy Credits:\n1. 10 credits - $0.99\n2. 100 credits - $4.99 (Save $4.91)\n3. 500 credits - $19.99 (Save $29.91)\n\nEnter 1, 2, or 3:');
            if (c === '1') score += 10;
            if (c === '2') score += 100;
            if (c === '3') score += 500;
            document.getElementById('score').textContent = score;
        }
        
        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }
        
        // 初始化
        initDice();
        initBoard();
    </script>
</body>
</html>
