<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Spin 18</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
        }
        .header { text-align: center; color: white; margin-bottom: 10px; }
        .header h1 { font-size: 24px; }
        .score-board { 
            background: white; 
            border-radius: 15px; 
            padding: 12px 35px; 
            margin-bottom: 15px; 
            display: flex; 
            gap: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .score-value { font-size: 28px; font-weight: 700; color: #667eea; }
        .score-label { font-size: 11px; color: #666; }
        
        /* 游戏板 */
        .game-board {
            width: 340px;
            height: 400px;
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 10px;
        }
        
        .cell {
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .cell.normal { background: linear-gradient(135deg, #ff6b9d 0%, #ff8e53 100%); color: white; }
        .cell.empty { background: linear-gradient(135deg, #d0d0d0 0%, #b0b0b0 100%); color: #666; }
        .cell.bonus { background: linear-gradient(135deg, #feca57 0%, #ff9ff3 100%); color: white; }
        .cell.prize { 
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); 
            color: #d63031; 
            border: 2px solid #ff6b6b;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .cell.active {
            box-shadow: 0 0 20px #ffd700, 0 0 40px #ffd700;
            transform: scale(1.15);
            z-index: 10;
        }
        
        /* 3D骰子 */
        .dice-3d {
            position: absolute;
            width: 50px;
            height: 50px;
            transform-style: preserve-3d;
            transition: all 0.5s ease-out;
            z-index: 100;
        }
        
        .dice-3d.throwing {
            animation: diceThrow 1s ease-out forwards;
        }
        
        @keyframes diceThrow {
            0% { 
                transform: translate(-50%, -50%) rotateX(0deg) rotateY(0deg) scale(1);
                top: 50%;
                left: 50%;
            }
            50% {
                transform: translate(-50%, -150%) rotateX(360deg) rotateY(360deg) scale(1.2);
            }
            100% { 
                transform: rotateX(720deg) rotateY(720deg) scale(1);
            }
        }
        
        .dice-face {
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            backface-visibility: hidden;
        }
        
        .dice-face:nth-child(1) { transform: rotateY(0deg) translateZ(25px); }
        .dice-face:nth-child(2) { transform: rotateY(90deg) translateZ(25px); }
        .dice-face:nth-child(3) { transform: rotateY(180deg) translateZ(25px); }
        .dice-face:nth-child(4) { transform: rotateY(-90deg) translateZ(25px); }
        .dice-face:nth-child(5) { transform: rotateX(90deg) translateZ(25px); }
        .dice-face:nth-child(6) { transform: rotateX(-90deg) translateZ(25px); }
        
        /* 骰子点数 */
        .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; position: absolute; }
        .face-1 .dot:nth-child(1) { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .face-2 .dot:nth-child(1) { top: 25%; left: 25%; }
        .face-2 .dot:nth-child(2) { bottom: 25%; right: 25%; }
        .face-3 .dot:nth-child(1) { top: 25%; left: 25%; }
        .face-3 .dot:nth-child(2) { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .face-3 .dot:nth-child(3) { bottom: 25%; right: 25%; }
        .face-4 .dot:nth-child(1) { top: 25%; left: 25%; }
        .face-4 .dot:nth-child(2) { top: 25%; right: 25%; }
        .face-4 .dot:nth-child(3) { bottom: 25%; left: 25%; }
        .face-4 .dot:nth-child(4) { bottom: 25%; right: 25%; }
        .face-5 .dot:nth-child(1) { top: 25%; left: 25%; }
        .face-5 .dot:nth-child(2) { top: 25%; right: 25%; }
        .face-5 .dot:nth-child(3) { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .face-5 .dot:nth-child(4) { bottom: 25%; left: 25%; }
        .face-5 .dot:nth-child(5) { bottom: 25%; right: 25%; }
        .face-6 .dot:nth-child(1) { top: 25%; left: 25%; }
        .face-6 .dot:nth-child(2) { top: 25%; right: 25%; }
        .face-6 .dot:nth-child(3) { top: 50%; left: 25%; transform: translateY(-50%); }
        .face-6 .dot:nth-child(4) { top: 50%; right: 25%; transform: translateY(-50%); }
        .face-6 .dot:nth-child(5) { bottom: 25%; left: 25%; }
        .face-6 .dot:nth-child(6) { bottom: 25%; right: 25%; }
        
        .controls { margin-top: 20px; text-align: center; }
        .roll-btn { 
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8e53 100%); 
            color: white; 
            border: none; 
            padding: 15px 45px; 
            border-radius: 30px; 
            font-size: 17px; 
            font-weight: 700; 
            cursor: pointer;
        }
        .roll-btn:disabled { background: #ccc; }
        .action-btn { background: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 13px; margin: 8px 5px; cursor: pointer; }
        
        .message, .overlay { display: none; position: fixed; }
        .message.show, .overlay.show { display: block; }
        .overlay { top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        .message { top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px 40px; border-radius: 15px; text-align: center; z-index: 100; }
    </style>
</head>
<body>
    <div class="header"><h1>🎲 Lucky Spin 18</h1></div>
    <div class="score-board">
        <div><div class="score-value" id="score">10</div><div class="score-label">积分</div></div>
        <div><div class="score-value" id="rounds">0</div><div class="score-label">圈数</div></div>
    </div>
    
    <div class="game-board" id="board"></div>
    
    <div class="controls">
        <button class="roll-btn" id="rollBtn" onclick="roll()">🎲 掷骰子 (3分)</button>
        <div>
            <button class="action-btn" onclick="watchAd()">📺 广告+5分</button>
            <button class="action-btn" onclick="buy()">💎 买积分</button>
        </div>
    </div>
    
    <div class="overlay" id="overlay"></div>
    <div class="message" id="msg">
        <div style="font-size:45px;" id="msgIcon">🎉</div>
        <div style="font-size:16px;font-weight:600;margin-top:10px;" id="msgText">消息</div>
    </div>

    <script>
        // 18个格子: 1个顶部 + 16个4x4 + 1个底部
        let cells = [
            {id:1,p:2,t:'bonus'},   // 顶部单独
            {id:2,p:1,t:'n'},{id:3,p:2,t:'n'},{id:4,p:0,t:'e'},{id:5,p:1,t:'n'},  // 第一行
            {id:6,p:3,t:'b'},{id:7,p:0,t:'e'},{id:8,p:1,t:'n'},{id:9,p:0,t:'prize'}, // 第二行
            {id:10,p:2,t:'n'},{id:11,p:0,t:'e'},{id:12,p:5,t:'b'},{id:13,p:0,t:'e'}, // 第三行
            {id:14,p:1,t:'n'},{id:15,p:2,t:'n'},{id:16,p:0,t:'e'},{id:17,p:1,t:'n'}, // 第四行
            {id:18,p:3,t:'bonus'}   // 底部单独
        ];
        
        let score = 10, pos = 0, rounds = 0, rolling = false;
        
        // 18格布局: 顶部1 + 4x4中间 + 底部1
        function getPos(i) {
            const s = 50, gap = 8, startX = 45, startY = 55;
            
            // 顶部单独格子 (居中)
            if (i === 0) return {x: startX + 1.5 * (s + gap), y: 5};
            
            // 底部单独格子 (居中)
            if (i === 17) return {x: startX + 1.5 * (s + gap), y: startY + 4 * (s + gap)};
            
            // 中间4x4格子 (i=1到16)
            const row = Math.floor((i - 1) / 4);
            const col = (i - 1) % 4;
            return {x: startX + col * (s + gap), y: startY + row * (s + gap)};
        }
        
        function init() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            
            cells.forEach((c, i) => {
                const p = getPos(i);
                const el = document.createElement('div');
                el.className = 'cell ' + (c.t === 'n' ? 'normal' : c.t === 'e' ? 'empty' : c.t === 'b' ? 'bonus' : 'prize');
                el.style.left = p.x + 'px';
                el.style.top = p.y + 'px';
                el.id = 'c' + i;
                el.innerHTML = c.t === 'prize' ? '<div style="font-size:20px;">🎁</div>' : `<div style="font-size:8px;">${c.id}</div><div style="font-size:12px;font-weight:700;">${c.p > 0 ? '+' + c.p : c.p}</div>`;
                b.appendChild(el);
            });
            highlight();
        }
        
        function highlight() {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            document.getElementById('c' + pos).classList.add('active');
        }
        
        // 创建3D骰子
        function createDice(value) {
            const dice = document.createElement('div');
            dice.className = 'dice-3d';
            dice.id = 'dice';
            
            const faces = [
                `<div class="dice-face face-1"><div class="dot"></div></div>`,
                `<div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>`,
                `<div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`,
                `<div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`,
                `<div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`,
                `<div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`
            ];
            
            dice.innerHTML = faces.join('');
            
            // 设置旋转到对应面
            const rotations = [
                'rotateX(0deg) rotateY(0deg)',
                'rotateX(-90deg) rotateY(0deg)',
                'rotateX(0deg) rotateY(-90deg)',
                'rotateX(0deg) rotateY(90deg)',
                'rotateX(90deg) rotateY(0deg)',
                'rotateX(180deg) rotateY(0deg)'
            ];
            dice.style.transform = rotations[value - 1];
            
            return dice;
        }
        
        async function roll() {
            if (rolling) return;
            if (score < 3) { show('😅', '积分不足'); return; }
            
            rolling = true;
            score -= 3;
            document.getElementById('score').textContent = score;
            document.getElementById('rollBtn').disabled = true;
            
            // 随机点数
            const v = Math.floor(Math.random() * 6) + 1;
            
            // 创建骰子并抛出
            const board = document.getElementById('board');
            const oldDice = document.getElementById('dice');
            if (oldDice) oldDice.remove();
            
            const dice = createDice(v);
            dice.style.left = '50%';
            dice.style.top = '50%';
            dice.style.transform = 'translate(-50%, -50%)';
            board.appendChild(dice);
            
            // 抛出动画
            await sleep(100);
            dice.classList.add('throwing');
            
            // 计算落点位置
            const targetPos = getPos((pos + v) % 18);
            
            // 等待动画完成
            await sleep(800);
            
            // 移动骰子到目标格子
            dice.style.transition = 'all 0.3s ease-out';
            dice.style.left = (targetPos.x + 24) + 'px';
            dice.style.top = (targetPos.y + 24) + 'px';
            dice.style.transform = 'translate(-50%, -50%) scale(0.8)';
            
            await sleep(300);
            
            // 显示点数后消失
            await sleep(500);
            dice.style.opacity = '0';
            dice.style.transform = 'translate(-50%, -50%) scale(0)';
            
            await sleep(300);
            dice.remove();
            
            // 移动棋子
            await move(v);
            
            document.getElementById('rollBtn').disabled = false;
            rolling = false;
        }
        
        async function move(steps) {
            for (let i = 0; i < steps; i++) {
                pos = (pos + 1) % 18;
                highlight();
                await sleep(200);
            }
            
            if (pos < steps) {
                rounds++;
                document.getElementById('rounds').textContent = rounds;
                shuffle();
            }
            
            const c = cells[pos];
            if (c.t === 'prize') setTimeout(lottery, 300);
            else if (c.p > 0) {
                score += c.p;
                document.getElementById('score').textContent = score;
                show('🎉', '+' + c.p + '分');
            } else show('😅', '空白格');
        }
        
        function shuffle() {
            const prize = cells.find(c => c.t === 'prize');
            const others = cells.filter(c => c.t !== 'prize').sort(() => Math.random() - 0.5);
            others.splice(Math.floor(Math.random() * 18), 0, prize);
            cells = others;
            init();
            show('🔄', '格子变化');
        }
        
        function lottery() {
            const r = Math.random();
            const p = [{n:'iPhone',pr:0.0001,i:'📱'},{n:'AirPods',pr:0.005,i:'🎧'},{n:'充电宝',pr:0.05,i:'🔋'},{n:'支架',pr:0.20,i:'📲'},{n:'10分',pr:0.7449,i:'💎'}];
            let c = 0, w = p[4];
            for (const x of p) { c += x.pr; if (r <= c) { w = x; break; }}
            if (w.n === '10分') { score += 10; document.getElementById('score').textContent = score; }
            show(w.i, w.n);
        }
        
        function show(icon, text) {
            document.getElementById('msgIcon').textContent = icon;
            document.getElementById('msgText').textContent = text;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('msg').classList.add('show');
            setTimeout(() => { document.getElementById('overlay').classList.remove('show'); document.getElementById('msg').classList.remove('show'); }, 2000);
        }
        
        function watchAd() { show('📺', '+5分'); setTimeout(() => { score += 5; document.getElementById('score').textContent = score; }, 2000); }
        function buy() { const c = prompt('1.10分-1元\n2.100分-6元\n3.500分-25元'); if (c === '1') score += 10; if (c === '2') score += 100; if (c === '3') score += 500; document.getElementById('score').textContent = score; }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        
        init();
    </script>
</body>
</html>
