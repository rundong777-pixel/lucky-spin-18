<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸运骰子 - Lucky Dice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98FB98 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }
        
        /* 顶部积分栏 */
        .top-bar {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        
        .score-display {
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            border: 3px solid #8B4513;
            border-radius: 25px;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .score-icon { font-size: 28px; }
        .score-amount { font-size: 26px; font-weight: bold; color: #8B4513; }
        
        /* 奖品展示 */
        .prize-showcase {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .prize-item {
            background: linear-gradient(180deg, #FFF8DC 0%, #F5DEB3 100%);
            border: 2px solid #8B4513;
            border-radius: 10px;
            padding: 8px 12px;
            text-align: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        
        .prize-item .icon { font-size: 24px; }
        .prize-item .name { font-size: 11px; color: #8B4513; font-weight: bold; }
        
        /* 游戏棋盘 */
        .board-container {
            width: min(340px, 92vw);
            aspect-ratio: 1;
            background: #F5DEB3;
            border: 5px solid #8B4513;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* 16个格子 - 4x4布局 */
        .cell {
            position: absolute;
            width: 21%;
            height: 21%;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            border: 2px solid rgba(0,0,0,0.1);
        }
        
        .cell.normal { background: linear-gradient(180deg, #87CEEB 0%, #4682B4 100%); color: white; }
        .cell.empty { background: linear-gradient(180deg, #D3D3D3 0%, #A9A9A9 100%); color: #666; }
        .cell.bonus { background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%); color: #8B4513; }
        .cell.prize { 
            background: linear-gradient(180deg, #FF1493 0%, #C71585 100%); 
            color: white;
            border: 3px solid #FFD700;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }
        
        .cell.active {
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700;
            transform: scale(1.1);
            z-index: 10;
        }
        
        .cell-num { font-size: 9px; opacity: 0.9; }
        .cell-points { font-size: 14px; }
        
        /* 皇后棋子 */
        .queen-piece {
            position: absolute;
            width: 35px;
            height: 35px;
            font-size: 28px;
            z-index: 50;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .queen-piece.jumping {
            animation: bounce 0.4s ease-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.15); }
        }
        
        /* 中心骰子 */
        .center-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 26%;
            height: 26%;
            background: linear-gradient(180deg, #FFF8DC 0%, #F5DEB3 100%);
            border: 4px solid #8B4513;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        #dice-canvas {
            width: 80%;
            height: 80%;
        }
        
        /* 控制按钮 */
        .controls {
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn-roll {
            background: linear-gradient(180deg, #FF6B6B 0%, #DC143C 100%);
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            cursor: pointer;
            box-shadow: 0 6px 0 #8B0000, 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        
        .btn-roll:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8B0000, 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .btn-roll:disabled {
            background: #888;
            box-shadow: 0 2px 0 #555;
            cursor: not-allowed;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .btn-small {
            flex: 1;
            background: linear-gradient(180deg, #87CEEB 0%, #4682B4 100%);
            border: none;
            border-radius: 15px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #2F4F4F;
        }
        
        .btn-small:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2F4F4F;
        }
        
        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.show { display: flex; }
        
        .modal-content {
            background: linear-gradient(180deg, #FFF8DC 0%, #F5DEB3 100%);
            border: 4px solid #8B4513;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
            width: 100%;
        }
        
        .modal-icon { font-size: 50px; margin-bottom: 15px; }
        .modal-title { font-size: 22px; font-weight: bold; color: #8B4513; margin-bottom: 10px; }
        .modal-text { font-size: 16px; color: #333; }
        
        .btn-ok {
            margin-top: 20px;
            background: linear-gradient(180deg, #90EE90 0%, #32CD32 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #228B22;
        }
    </style>
</head>
<body>
    <!-- 积分显示 -->
    <div class="top-bar">
        <div class="score-display">
            <span class="score-icon">💎</span>
            <span class="score-amount" id="score">10</span>
        </div>
    </div>
    
    <!-- 奖品展示 -->
    <div class="prize-showcase">
        <div class="prize-item">
            <div class="icon">📱</div>
            <div class="name">iPhone 16</div>
        </div>
        <div class="prize-item">
            <div class="icon">🎧</div>
            <div class="name">AirPods</div>
        </div>
        <div class="prize-item">
            <div class="icon">🔋</div>
            <div class="name">充电宝</div>
        </div>
        <div class="prize-item">
            <div class="icon">📲</div>
            <div class="name">手机支架</div>
        </div>
        <div class="prize-item">
            <div class="icon">💎</div>
            <div class="name">10积分</div>
        </div>
    </div>
    
    <!-- 游戏棋盘 -->
    <div class="board-container" id="board">
        <div class="center-area">
            <canvas id="dice-canvas"></canvas>
        </div>
    </div>
    
    <!-- 控制按钮 -->
    <div class="controls">
        <button class="btn-roll" id="rollBtn" onclick="rollDice()">
            🎲 掷骰子 (消耗3积分)
        </button>
        <div class="btn-row">
            <button class="btn-small" onclick="watchAd()">📺 看广告 +5</button>
            <button class="btn-small" onclick="buy()">💎 购买积分</button>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-title" id="modalTitle">恭喜!</div>
            <div class="modal-text" id="modalText">获得奖励!</div>
            <button class="btn-ok" onclick="closeModal()">太棒了!</button>
        </div>
    </div>

    <script>
        // 16格配置
        let cells = [
            {id:1,p:1,t:'normal'}, {id:2,p:2,t:'normal'}, {id:3,p:0,t:'empty'}, {id:4,p:1,t:'normal'},
            {id:5,p:3,t:'bonus'}, {id:6,p:0,t:'empty'}, {id:7,p:1,t:'normal'}, {id:8,p:0,t:'prize'},
            {id:9,p:2,t:'normal'}, {id:10,p:0,t:'empty'}, {id:11,p:5,t:'bonus'}, {id:12,p:0,t:'empty'},
            {id:13,p:1,t:'normal'}, {id:14,p:2,t:'normal'}, {id:15,p:0,t:'empty'}, {id:16,p:1,t:'normal'}
        ];
        
        let score = 10, position = 0, isRolling = false;
        let scene, camera, renderer, diceMesh;
        
        // 初始化3D骰子
        function init3DDice() {
            const canvas = document.getElementById('dice-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
            camera.position.z = 3;
            
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const materials = [];
            
            for (let i = 0; i < 6; i++) {
                const cvs = document.createElement('canvas');
                cvs.width = 128; cvs.height = 128;
                const ctx = cvs.getContext('2d');
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 128, 128);
                
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 4;
                ctx.strokeRect(4, 4, 120, 120);
                
                ctx.fillStyle = '#DC143C';
                const dots = [
                    [], [[64,64]], [[32,32],[96,96]], [[32,32],[64,64],[96,96]],
                    [[32,32],[96,32],[32,96],[96,96]],
                    [[32,32],[96,32],[64,64],[32,96],[96,96]],
                    [[32,32],[96,32],[32,64],[96,64],[32,96],[96,96]]
                ];
                dots[i+1].forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p[0], p[1], 12, 0, Math.PI*2);
                    ctx.fill();
                });
                
                materials.push(new THREE.MeshPhongMaterial({ map: new THREE.CanvasTexture(cvs) }));
            }
            
            diceMesh = new THREE.Mesh(geometry, materials);
            scene.add(diceMesh);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            renderer.render(scene, camera);
        }
        
        // 4x4格子位置
        function getCellPosition(index) {
            const cellSize = 21, gap = 3.5;
            const row = Math.floor(index / 4);
            const col = index % 4;
            return {
                left: gap + col * (cellSize + gap),
                top: gap + row * (cellSize + gap)
            };
        }
        
        // 初始化棋盘
        function initBoard() {
            const board = document.getElementById('board');
            const center = board.querySelector('.center-area');
            board.innerHTML = '';
            board.appendChild(center);
            
            cells.forEach((cell, i) => {
                const pos = getCellPosition(i);
                const el = document.createElement('div');
                el.className = `cell ${cell.t}`;
                el.style.left = pos.left + '%';
                el.style.top = pos.top + '%';
                el.id = 'cell-' + i;
                el.innerHTML = cell.t === 'prize' ? '🎁' : `<div class="cell-num">${cell.id}</div><div class="cell-points">${cell.p > 0 ? '+' + cell.p : cell.p}</div>`;
                board.appendChild(el);
            });
            
            // 皇后棋子
            const queen = document.createElement('div');
            queen.className = 'queen-piece';
            queen.id = 'queen';
            queen.innerHTML = '♛';
            board.appendChild(queen);
            
            updateQueenPosition();
        }
        
        function updateQueenPosition() {
            const queen = document.getElementById('queen');
            const pos = getCellPosition(position);
            queen.style.left = (pos.left + 10.5 - 4.5) + '%';
            queen.style.top = (pos.top + 10.5 - 5) + '%';
        }
        
        function highlightCell(idx) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            document.getElementById('cell-' + idx).classList.add('active');
        }
        
        async function rollDice() {
            if (isRolling) return;
            if (score < 3) {
                showModal('😅', '积分不足!', '需要3积分才能掷骰子');
                return;
            }
            
            isRolling = true;
            score -= 3;
            document.getElementById('score').textContent = score;
            document.getElementById('rollBtn').disabled = true;
            
            const result = Math.floor(Math.random() * 6) + 1;
            
            // 3D骰子动画
            const canvas = document.getElementById('dice-canvas');
            canvas.style.display = 'block';
            
            let rotation = 0;
            const animate = () => {
                rotation += 20;
                diceMesh.rotation.set(rotation * 0.5, rotation, rotation * 0.3);
                renderer.render(scene, camera);
                if (rotation < 720) requestAnimationFrame(animate);
            };
            animate();
            
            await sleep(800);
            
            // 显示结果
            const rots = {
                1: {x:0,y:0,z:0}, 2: {x:-Math.PI/2,y:0,z:0}, 3: {x:0,y:Math.PI/2,z:0},
                4: {x:0,y:-Math.PI/2,z:0}, 5: {x:Math.PI/2,y:0,z:0}, 6: {x:Math.PI,y:0,z:0}
            };
            diceMesh.rotation.set(rots[result].x, rots[result].y, rots[result].z);
            renderer.render(scene, camera);
            
            await sleep(400);
            canvas.style.display = 'none';
            
            // 移动皇后棋子
            await moveQueen(result);
            
            document.getElementById('rollBtn').disabled = false;
            isRolling = false;
        }
        
        async function moveQueen(steps) {
            const queen = document.getElementById('queen');
            
            for (let i = 0; i < steps; i++) {
                position = (position + 1) % 16;
                highlightCell(position);
                
                // 跳跃动画
                queen.classList.add('jumping');
                updateQueenPosition();
                
                await sleep(350);
                queen.classList.remove('jumping');
            }
            
            // 处理格子效果
            const cell = cells[position];
            if (cell.t === 'prize') {
                doLottery();
            } else if (cell.p > 0) {
                score += cell.p;
                document.getElementById('score').textContent = score;
                showModal('🎉', '获得积分!', '+' + cell.p + ' 积分');
            } else {
                showModal('😅', '空白格子', '这次没有积分');
            }
        }
        
        function doLottery() {
            const r = Math.random();
            const prizes = [
                {n: 'iPhone 16 Pro!', p: 0.0001, i: '📱'},
                {n: 'AirPods Pro 2!', p: 0.005, i: '🎧'},
                {n: '小米充电宝', p: 0.05, i: '🔋'},
                {n: '手机支架', p: 0.20, i: '📲'},
                {n: '10积分', p: 0.7449, i: '💎'}
            ];
            
            let cum = 0, won = prizes[4];
            for (const p of prizes) {
                cum += p.p;
                if (r <= cum) { won = p; break; }
            }
            
            if (won.n === '10积分') {
                score += 10;
                document.getElementById('score').textContent = score;
            }
            
            showModal(won.i, '恭喜中奖!', '你获得了: ' + won.n);
        }
        
        function showModal(icon, title, text) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        function watchAd() {
            showModal('📺', '观看广告中...', '+5积分即将到账');
            setTimeout(() => {
                score += 5;
                document.getElementById('score').textContent = score;
                showModal('💎', '观看完成!', '+5积分已到账');
            }, 2000);
        }
        
        function buy() {
            const amt = prompt('购买积分:\n1. 10积分 - ¥1\n2. 100积分 - ¥6 (省¥4)\n3. 500积分 - ¥25 (省¥25)');
            if (amt === '1') score += 10;
            if (amt === '2') score += 100;
            if (amt === '3') score += 500;
            document.getElementById('score').textContent = score;
        }
        
        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }
        
        // 初始化
        init3DDice();
        initBoard();
    </script>
</body>
</html>
