<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Master - 骰子大师</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98FB98 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }
        
        /* 顶部金币栏 */
        .top-bar {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .coin-display {
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            border: 3px solid #8B4513;
            border-radius: 25px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .coin-icon { font-size: 24px; }
        .coin-amount { font-size: 22px; font-weight: bold; color: #8B4513; }
        
        .add-btn {
            background: #FF6B6B;
            border: 2px solid #8B4513;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }
        
        /* 游戏棋盘 */
        .board-container {
            width: min(360px, 95vw);
            aspect-ratio: 1;
            background: #F5DEB3;
            border: 6px solid #8B4513;
            border-radius: 20px;
            position: relative;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.3),
                inset 0 0 50px rgba(139,69,19,0.1);
            overflow: hidden;
        }
        
        /* 棋盘格子 */
        .cell {
            position: absolute;
            width: 22%;
            height: 22%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            border: 2px solid rgba(0,0,0,0.1);
        }
        
        /* 不同颜色格子 */
        .cell.brown { background: linear-gradient(180deg, #D2691E 0%, #8B4513 100%); color: white; }
        .cell.blue { background: linear-gradient(180deg, #87CEEB 0%, #4682B4 100%); color: white; }
        .cell.pink { background: linear-gradient(180deg, #FFB6C1 0%, #FF69B4 100%); color: white; }
        .cell.orange { background: linear-gradient(180deg, #FFA500 0%, #FF8C00 100%); color: white; }
        .cell.red { background: linear-gradient(180deg, #FF6B6B 0%, #DC143C 100%); color: white; }
        .cell.yellow { background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%); color: #8B4513; }
        .cell.green { background: linear-gradient(180deg, #90EE90 0%, #32CD32 100%); color: white; }
        .cell.prize { 
            background: linear-gradient(180deg, #FF1493 0%, #C71585 100%); 
            color: white;
            border: 3px solid #FFD700;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,215,0,0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,215,0,0.8); }
        }
        
        .cell.active {
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700;
            transform: scale(1.1);
            z-index: 10;
        }
        
        .cell-name { font-size: clamp(8px, 2vw, 10px); text-align: center; }
        .cell-price { font-size: clamp(10px, 2.5vw, 12px); }
        
        /* 棋子 */
        .token {
            position: absolute;
            width: 35px;
            height: 35px;
            font-size: 28px;
            z-index: 50;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.4));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .token.jumping {
            animation: bounce 0.4s ease-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.2); }
        }
        
        /* 中心骰子区 */
        .center-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28%;
            height: 28%;
            background: linear-gradient(180deg, #FFF8DC 0%, #F5DEB3 100%);
            border: 4px solid #8B4513;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        #dice-canvas {
            width: 80%;
            height: 80%;
        }
        
        /* 底部控制区 */
        .controls {
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* 大按钮 */
        .btn-roll {
            background: linear-gradient(180deg, #FF6B6B 0%, #DC143C 100%);
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            cursor: pointer;
            box-shadow: 
                0 6px 0 #8B0000,
                0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        
        .btn-roll:active {
            transform: translateY(4px);
            box-shadow: 
                0 2px 0 #8B0000,
                0 4px 8px rgba(0,0,0,0.3);
        }
        
        .btn-roll:disabled {
            background: #888;
            box-shadow: 0 2px 0 #555;
            cursor: not-allowed;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .btn-small {
            flex: 1;
            background: linear-gradient(180deg, #87CEEB 0%, #4682B4 100%);
            border: none;
            border-radius: 15px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #2F4F4F;
        }
        
        .btn-small:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2F4F4F;
        }
        
        /* 消息弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: linear-gradient(180deg, #FFF8DC 0%, #F5DEB3 100%);
            border: 5px solid #8B4513;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 300px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        
        .modal-icon { font-size: 60px; margin-bottom: 15px; }
        .modal-title { font-size: 24px; font-weight: bold; color: #8B4513; margin-bottom: 10px; }
        .modal-text { font-size: 18px; color: #333; }
        
        .btn-ok {
            margin-top: 20px;
            background: linear-gradient(180deg, #90EE90 0%, #32CD32 100%);
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #228B22;
        }
        
        .btn-ok:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #228B22;
        }
    </style>
</head>
<body>
    <!-- 顶部金币 -->
    <div class="top-bar">
        <div class="coin-display">
            <span class="coin-icon">💰</span>
            <span class="coin-amount" id="coins">100</span>
        </div>
        <button class="add-btn" onclick="addCoins()">+</button>
    </div>
    
    <!-- 游戏棋盘 -->
    <div class="board-container" id="board">
        <div class="center-area">
            <canvas id="dice-canvas"></canvas>
        </div>
    </div>
    
    <!-- 控制按钮 -->
    <div class="controls">
        <button class="btn-roll" id="rollBtn" onclick="rollDice()">
            🎲 ROLL! (5)
        </button>
        <div class="btn-row">
            <button class="btn-small" onclick="watchAd()">📺 +20</button>
            <button class="btn-small" onclick="showPrizes()">🎁 PRIZES</button>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎉</div>
            <div class="modal-title" id="modalTitle">Congratulations!</div>
            <div class="modal-text" id="modalText">You got something!</div>
            <button class="btn-ok" onclick="closeModal()">AWESOME!</button>
        </div>
    </div>

    <script>
        // 16个格子数据（大富翁风格）
        const cellData = [
            {name: 'GO', price: '+10', color: 'yellow', type: 'start'},
            {name: 'Mediterranean', price: '$60', color: 'brown'},
            {name: 'Chance', price: '?', color: 'blue', type: 'chance'},
            {name: 'Baltic', price: '$60', color: 'brown'},
            {name: 'Oriental', price: '$100', color: 'blue'},
            {name: 'Vermont', price: '$100', color: 'blue'},
            {name: 'Connecticut', price: '$120', color: 'blue'},
            {name: '🎁 PRIZE', price: 'WIN!', color: 'prize', type: 'prize'},
            {name: 'St.Charles', price: '$140', color: 'pink'},
            {name: 'States', price: '$140', color: 'pink'},
            {name: 'Virginia', price: '$160', color: 'pink'},
            {name: 'St.James', price: '$180', color: 'orange'},
            {name: 'Tennessee', price: '$180', color: 'orange'},
            {name: 'New York', price: '$200', color: 'orange'},
            {name: 'Free Parking', price: 'REST', color: 'green', type: 'parking'},
            {name: 'Kentucky', price: '$220', color: 'red'}
        ];
        
        let coins = 100, position = 0, isRolling = false;
        let scene, camera, renderer, diceMesh;
        
        // 初始化3D骰子
        function init3DDice() {
            const canvas = document.getElementById('dice-canvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
            camera.position.z = 3;
            
            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            
            // 创建骰子
            const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const materials = [];
            
            for (let i = 0; i < 6; i++) {
                const cvs = document.createElement('canvas');
                cvs.width = 128; cvs.height = 128;
                const ctx = cvs.getContext('2d');
                
                // 白色背景
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, 128, 128);
                
                // 圆角边框
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 4;
                ctx.strokeRect(4, 4, 120, 120);
                
                // 红色圆点
                ctx.fillStyle = '#DC143C';
                const dots = [
                    [], [[64,64]], [[32,32],[96,96]], [[32,32],[64,64],[96,96]],
                    [[32,32],[96,32],[32,96],[96,96]],
                    [[32,32],[96,32],[64,64],[32,96],[96,96]],
                    [[32,32],[96,32],[32,64],[96,64],[32,96],[96,96]]
                ];
                dots[i+1].forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p[0], p[1], 12, 0, Math.PI*2);
                    ctx.fill();
                });
                
                materials.push(new THREE.MeshPhongMaterial({ 
                    map: new THREE.CanvasTexture(cvs),
                    shininess: 100
                }));
            }
            
            diceMesh = new THREE.Mesh(geometry, materials);
            scene.add(diceMesh);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            renderer.render(scene, camera);
        }
        
        // 获取格子位置（大富翁环形布局）
        function getCellPosition(index) {
            const boardSize = 100; // 百分比
            const cellSize = 22;   // 百分比
            const gap = 2;         // 百分比
            
            // 底部4个 (0-3)
            if (index < 4) {
                return {
                    left: gap + index * (cellSize + gap),
                    top: 100 - cellSize - gap
                };
            }
            // 左侧4个 (4-7)
            else if (index < 8) {
                return {
                    left: gap,
                    top: 100 - cellSize - gap - (index - 3) * (cellSize + gap)
                };
            }
            // 顶部4个 (8-11)
            else if (index < 12) {
                return {
                    left: gap + (index - 8) * (cellSize + gap),
                    top: gap
                };
            }
            // 右侧4个 (12-15)
            else {
                return {
                    left: 100 - cellSize - gap,
                    top: gap + (index - 11) * (cellSize + gap)
                };
            }
        }
        
        // 初始化棋盘
        function initBoard() {
            const board = document.getElementById('board');
            const center = board.querySelector('.center-area');
            board.innerHTML = '';
            board.appendChild(center);
            
            cellData.forEach((cell, i) => {
                const pos = getCellPosition(i);
                const el = document.createElement('div');
                el.className = `cell ${cell.color}`;
                el.style.left = pos.left + '%';
                el.style.top = pos.top + '%';
                el.id = 'cell-' + i;
                el.innerHTML = `
                    <div class="cell-name">${cell.name}</div>
                    <div class="cell-price">${cell.price}</div>
                `;
                board.appendChild(el);
            });
            
            // 创建棋子
            const token = document.createElement('div');
            token.className = 'token';
            token.id = 'player-token';
            token.innerHTML = '🚗';
            board.appendChild(token);
            
            updateTokenPosition();
        }
        
        function updateTokenPosition() {
            const token = document.getElementById('player-token');
            const pos = getCellPosition(position);
            token.style.left = (pos.left + 11 - 4.5) + '%';
            token.style.top = (pos.top + 11 - 4.5) + '%';
        }
        
        function highlightCell(idx) {
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
            document.getElementById('cell-' + idx).classList.add('active');
        }
        
        async function rollDice() {
            if (isRolling) return;
            if (coins < 5) {
                showModal('😅', 'Not Enough Coins!', 'Watch an ad to get more');
                return;
            }
            
            isRolling = true;
            coins -= 5;
            document.getElementById('coins').textContent = coins;
            document.getElementById('rollBtn').disabled = true;
            
            const result = Math.floor(Math.random() * 6) + 1;
            
            // 3D骰子动画
            const canvas = document.getElementById('dice-canvas');
            canvas.style.display = 'block';
            
            let rotation = 0;
            const animate = () => {
                rotation += 20;
                diceMesh.rotation.set(rotation * 0.5, rotation, rotation * 0.3);
                renderer.render(scene, camera);
                if (rotation < 720) requestAnimationFrame(animate);
            };
            animate();
            
            await sleep(800);
            
            // 显示结果
            const rots = {
                1: {x:0,y:0,z:0}, 2: {x:-Math.PI/2,y:0,z:0}, 3: {x:0,y:Math.PI/2,z:0},
                4: {x:0,y:-Math.PI/2,z:0}, 5: {x:Math.PI/2,y:0,z:0}, 6: {x:Math.PI,y:0,z:0}
            };
            diceMesh.rotation.set(rots[result].x, rots[result].y, rots[result].z);
            renderer.render(scene, camera);
            
            await sleep(400);
            canvas.style.display = 'none';
            
            // 移动棋子
            await moveToken(result);
            
            document.getElementById('rollBtn').disabled = false;
            isRolling = false;
        }
        
        async function moveToken(steps) {
            const token = document.getElementById('player-token');
            
            for (let i = 0; i < steps; i++) {
                position = (position + 1) % 16;
                highlightCell(position);
                
                // 跳跃动画
                token.classList.add('jumping');
                updateTokenPosition();
                
                await sleep(400);
                token.classList.remove('jumping');
            }
            
            // 处理格子效果
            const cell = cellData[position];
            if (cell.type === 'prize') {
                doLottery();
            } else if (cell.type === 'start') {
                coins += 10;
                document.getElementById('coins').textContent = coins;
                showModal('💰', 'Pass GO!', '+10 coins');
            } else if (cell.price.startsWith('$')) {
                const rent = parseInt(cell.price.slice(1)) / 10;
                coins += Math.floor(rent);
                document.getElementById('coins').textContent = coins;
                showModal('🏠', 'Collect Rent!', `+${Math.floor(rent)} coins`);
            } else {
                showModal('📍', cell.name, cell.price);
            }
        }
        
        function doLottery() {
            const r = Math.random();
            const prizes = [
                {n: 'iPhone 16!', p: 0.001, i: '📱'},
                {n: 'AirPods!', p: 0.01, i: '🎧'},
                {n: '$50 Gift Card', p: 0.05, i: '🎁'},
                {n: '100 Coins', p: 0.2, i: '💰'},
                {n: '20 Coins', p: 0.739, i: '🪙'}
            ];
            
            let cum = 0, won = prizes[4];
            for (const p of prizes) {
                cum += p.p;
                if (r <= cum) { won = p; break; }
            }
            
            if (won.n.includes('Coins')) {
                const amt = parseInt(won.n);
                coins += amt;
                document.getElementById('coins').textContent = coins;
            }
            
            showModal(won.i, 'JACKPOT!', 'You won: ' + won.n);
        }
        
        function showModal(icon, title, text) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        function watchAd() {
            showModal('📺', 'Watching Ad...', '+20 coins coming!');
            setTimeout(() => {
                coins += 20;
                document.getElementById('coins').textContent = coins;
                showModal('💰', 'Ad Complete!', '+20 coins added');
            }, 2000);
        }
        
        function addCoins() {
            const amt = prompt('Add coins:\n1. 100 coins - $0.99\n2. 500 coins - $3.99\n3. 2000 coins - $9.99');
            if (amt === '1') coins += 100;
            if (amt === '2') coins += 500;
            if (amt === '3') coins += 2000;
            document.getElementById('coins').textContent = coins;
        }
        
        function showPrizes() {
            showModal('🏆', 'Prize List', '📱 iPhone, 🎧 AirPods, 🎁 Gift Cards!');
        }
        
        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }
        
        // 初始化
        init3DDice();
        initBoard();
    </script>
</body>
</html>
